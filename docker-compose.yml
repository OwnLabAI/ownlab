services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ownlab
      POSTGRES_PASSWORD: ownlab
      POSTGRES_DB: ownlab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownlab -d ownlab"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server-runtime
    environment:
      DATABASE_URL: postgres://ownlab:ownlab@db:5432/ownlab
      PORT: "3100"
      HOST: "0.0.0.0"
      OWNLAB_HOME: "/ownlab"
    volumes:
      - ownlab-data:/ownlab
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${OWNLAB_SERVER_PORT:-3100}:3100"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      OWNLAB_SERVER_URL: "http://server:3100"
      NEXT_PUBLIC_OWNLAB_SERVER_URL: "${NEXT_PUBLIC_OWNLAB_SERVER_URL:-http://localhost:3100}"
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${OWNLAB_WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  ownlab-data:
