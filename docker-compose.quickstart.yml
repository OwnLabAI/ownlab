services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server-runtime
    environment:
      OWNLAB_HOME: "/ownlab"
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3100"
    volumes:
      - "${OWNLAB_DATA_DIR:-./data/docker-ownlab}:/ownlab"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${OWNLAB_SERVER_PORT:-3100}:3100"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3000"
      OWNLAB_SERVER_URL: "http://server:3100"
      NEXT_PUBLIC_OWNLAB_SERVER_URL: "${NEXT_PUBLIC_OWNLAB_SERVER_URL:-http://localhost:3100}"
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${OWNLAB_WEB_PORT:-3000}:3000"
